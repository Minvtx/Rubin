name: Rubin Agent Cron Job

concurrency:
  group: rubin-agent-cron
  cancel-in-progress: false

on:
  schedule:
    # Runs at 12:00 UTC every day (09:00 AM ART)
    - cron: '0 12 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  tweet:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Important to push changes to journal.md
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Rubin Agent
        id: run_agent
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          python -c "from main import RubinAgent; agent = RubinAgent(); agent.run_once()"

      - name: Commit and push journal changes
        if: always()
        run: |
          git config --global user.name "Rubin Bot"
          git config --global user.email "bot@rubin.ai"
          git add journal.md
          git diff --cached --quiet && echo "No journal changes to commit" && exit 0
          git commit -m "Update journal [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Fail workflow if agent run failed
        if: steps.run_agent.outcome == 'failure'
        run: exit 1
